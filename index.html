<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
    <style>
        :root {
            --primary-color: #86efac;
            --secondary-color: #14532d;
            --bg-start: #f0fdf4;
            --bg-end: #dcfce7;
            --text-main: #14532d;
            --text-accent: #15803d;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            color: var(--text-main);
            line-height: 1.5;
            font-weight: 400;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #4ade80 100%);
            color: var(--secondary-color);
            padding: 1.25rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .star-icon {
            fill: currentColor;
            display: flex;
            align-items: center;
        }

        header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header nav {
            display: flex;
            gap: 2rem;
        }

        header nav a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s ease;
            position: relative;
            opacity: 0.8;
        }

        header nav a:hover {
            opacity: 1;
        }

        header nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--secondary-color);
            transition: width 0.3s ease;
        }

        header nav a:hover::after {
            width: 100%;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        section {
            padding: 5rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .features-section {
            background-color: transparent;
        }

        .reviews-section {
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(20, 83, 45, 0.05);
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            color: var(--secondary-color);
        }

        .reviews-container {
            display: flex;
            gap: 2rem;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .review-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(20, 83, 45, 0.05);
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: transform 0.3s ease;
        }

        .review-card:hover {
            transform: translateY(-10px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .user-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .user-name {
            font-weight: 700;
            color: var(--secondary-color);
        }

        .review-text {
            color: var(--text-accent);
            line-height: 1.6;
            font-style: italic;
        }

        footer {
            background-color: #f0fdf4;
            color: var(--text-accent);
            padding: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            border-top: 1px solid #dcfce7;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.03em;
            background: linear-gradient(to bottom, var(--secondary-color), #365314);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(20, 83, 45, 0.05));
        }

        .subtitle {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 부드러운 장식 요소 */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(134, 239, 172, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
        }

        .next-btn {
            display: inline-block;
            margin-top: 32px;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            color: var(--secondary-color);
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 14px 0 rgba(134, 239, 172, 0.39);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .next-btn:hover {
            transform: scale(1.05) translateY(-2px);
            color: white !important;
            box-shadow: 0 12px 24px rgba(20, 83, 45, 0.25);
            background: var(--secondary-color) !important;
        }

        .next-btn:active {
            transform: scale(0.98);
        }

        /* 반응형 스타일 */
        @media (max-width: 768px) {
            body {
                font-size: 15px;
            }

            header {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1.5rem;
                text-align: center;
            }

            header nav {
                flex-direction: column;
                gap: 0.75rem;
                width: 100%;
            }

            header nav a {
                padding: 12px;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 12px;
                font-size: 14px;
            }

            h1 {
                font-size: 42px;
                line-height: 1.1;
                margin-bottom: 24px;
            }

            section {
                padding: 4rem 1.5rem;
                min-height: auto;
            }

            .section-title {
                font-size: 2rem;
                margin-bottom: 2rem;
            }

            .review-card {
                min-width: 100%;
            }

            .review-text {
                font-size: 14px;
            }

            .blob {
                width: 300px;
                height: 300px;
            }

            .next-btn {
                padding: 18px 40px;
                width: 100%;
                max-width: 300px;
                font-size: 17px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-container">
            <svg class="star-icon" viewBox="0 0 24 24" width="24" height="24">
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
            </svg>
            <h2>나의 첫 서비스</h2>
        </div>
        <nav>
            <a href="#">소개</a>
            <a href="#">기능</a>
            <a href="#">문의</a>
        </nav>
    </header>

    <main>
        <section class="features-section">
            <div class="blob"></div>
            <div class="container">
                <p class="subtitle">Core Features</p>
                <h1 id="main-sentence">오늘도 힘내세요!</h1>
                <button class="next-btn" onclick="nextSentence()">다음 문장 보기</button>
            </div>
        </section>

        <section class="reviews-section">
            <h2 class="section-title">사용자 후기</h2>
            <div class="reviews-container">
                <div class="review-card">
                    <div class="user-info">
                        <img src="user_profile_1_1773666193676.png" alt="User 1" class="user-image">
                        <span class="user-name">김철수 님</span>
                    </div>
                    <p class="review-text">"이 서비스를 사용하고 나서 매일 아침이 즐거워졌습니다. 정말 추천해요!"</p>
                </div>
                <div class="review-card">
                    <div class="user-info">
                        <img src="user_profile_2_1773666223871.png" alt="User 2" class="user-image">
                        <span class="user-name">이영희 님</span>
                    </div>
                    <p class="review-text">"깔끔한 디자인과 직관적인 기능이 마음에 듭니다. 앞으로도 기대되네요."</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Service</p>
    </footer>

    <script>
        const sentences = [
            '오늘도 힘내세요!',
            '오늘도 해냈어요!',
            '조금씩 나아지고 있어요.',
            '이제 곧 완성이에요!'
        ];
        let currentIndex = 0;

        function nextSentence() {
            currentIndex = (currentIndex + 1) % sentences.length;
            const h1 = document.getElementById('main-sentence');
            const btn = document.querySelector('.next-btn');

            // 문장별 버튼 색상 설정 (테마에 맞는 녹색 계열로 수정)
            const buttonStyles = [
                { // Primary Light Green
                    bg: '#86efac',
                    color: '#14532d',
                    shadow: '0 4px 14px 0 rgba(134, 239, 172, 0.39)'
                },
                { // Medium Green
                    bg: '#4ade80',
                    color: '#14532d',
                    shadow: '0 4px 14px 0 rgba(74, 222, 128, 0.39)'
                },
                { // Bright Green
                    bg: '#22c55e',
                    color: 'white',
                    shadow: '0 4px 14px 0 rgba(34, 197, 94, 0.39)'
                },
                { // Forest Green
                    bg: '#16a34a',
                    color: 'white',
                    shadow: '0 4px 14px 0 rgba(22, 163, 74, 0.39)'
                }
            ];

            const style = buttonStyles[currentIndex];
            btn.style.background = style.bg;
            btn.style.color = style.color;
            btn.style.boxShadow = style.shadow;

            // 부드러운 전환 효과를 위해 애니메이션 재실행
            h1.parentElement.style.animation = 'none';
            h1.parentElement.offsetHeight; // 트리거 리플로우
            h1.parentElement.style.animation = 'fadeIn 0.8s ease-out';

            h1.textContent = sentences[currentIndex];
        }
    </script>
</body>

</html>
