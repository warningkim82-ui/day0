<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첫번째 아이디어</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f172a;
            /* 어두운 남색 계열 배경 */
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            font-size: 6rem;
            /* 글자 크기를 더 크게 (기존 3rem -> 6rem) */
            font-weight: 900;
            background: linear-gradient(135deg, #93c5fd, #3b82f6, #1d4ed8);
            /* 파란색 그라데이션 */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(59, 130, 246, 0.3);
            /* 파란색 빛 번짐(네온) 효과 */
            letter-spacing: -0.05em;
            text-align: center;
            margin: 0;
            padding: 0 20px;
        }
    </style>
</head>

<body>
    <h1>내 첫 번째 아이디어</h1>
</body>

</html>
